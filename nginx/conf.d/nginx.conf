limit_req_zone $binary_remote_addr zone=one:10m rate=100r/m;
limit_conn_zone $binary_remote_addr zone=connlimit:10m;
limit_conn connlimit 5;
server_tokens off;

# PROXY BACKEND
upstream site_backend {
    server web:5000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name applebyte.app www.applebyte.app;
     location / {
        limit_req zone=one burst=5 nodelay;
        return 301 https://$host$request_uri;
     }
}

server {
    listen 443 ssl;
    http2 on;
    server_name applebyte.app www.applebyte.app;

    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;
    ssl_session_tickets       off;

    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout          5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;


    if ($http_user_agent ~* (nikto|sqlmap|nmap|masscan|acunetix|curl|wget|httpclient|python-requests|scrapy|ja3|fuzzer|havij|morfeus|netsparker|winhttp|libwww-perl|ZmEu|HTTrack|clshttp|loader|email|harvest|grabber|loader|miner|pmafindbot|phpcrawl|sitecheck|l9tcpid)) {
        return 403;
    }

    location ~* \.(php|asp|exe|pl|cgi|scgi)$ {
        return 444;
    }

    location / {
        limit_req zone=one burst=50 nodelay;
        proxy_pass http://site_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nAllow: /\nDisallow: /*\n";
    }

    
}