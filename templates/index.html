<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Under Maintenance</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      .hero {
        min-height: 100vh;
        background-image: url("https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=1920&q=80");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
      }

      .card-maintenance {
        position: relative;
        z-index: 1;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="hero position-relative">
      <div class="overlay"></div>

      <div class="card-maintenance p-5 text-white text-center shadow-lg" style="max-width: 540px; width: 90%;">
        <!-- Wrench icon via Bootstrap Icons CDN -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="64"
          height="64"
          fill="currentColor"
          class="bi bi-tools mb-4 text-warning"
          viewBox="0 0 16 16"
        >
          <path
            d="M1 0 0 1l2.2 3.081a1 1 0 0 0 .815.419h.07a1 1 0 0 1 .708.293l2.675 2.675-1.617 1.617a.5.5 0 0 0 0 .707l2.475 2.475a.5.5 0 0 0 .707 0l1.616-1.617 2.675 2.675a1 1 0 0 1 .293.708v.07a1 1 0 0 0 .419.815L15 15l1-1-4.244-3.305-.59-.59-1.617 1.617-1.768-1.768 1.617-1.617-.59-.59L5.305 5.244 1 0zm4.478 7.588-2.49-2.49A1 1 0 0 1 3 4.4V4a1 1 0 0 0-.314-.727L1.354 2H1l.217.13L4 5l-.65.65L3 6l2.478 1.588z"
          />
          <path
            d="M15.528 2.973a.5.5 0 0 1 .472.527l-.52 6.502a.5.5 0 0 1-.998-.08l.52-6.5a.5.5 0 0 1 .526-.45zm-4.928 4.928a.5.5 0 0 1 .707 0l3.536 3.536a.5.5 0 0 1-.707.707l-3.536-3.536a.5.5 0 0 1 0-.707z"
          />
        </svg>

        <h1 class="display-5 fw-bold mb-3">Site Under Maintenance</h1>
        <p class="lead mb-4">
          We're currently making improvements to serve you better.<br />
          Please check back soon.
        </p>
        <hr class="border-light opacity-50" />
        <p class="small text-white-50 mt-3 mb-0">
          We apologize for any inconvenience. Thank you for your patience.
        </p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
