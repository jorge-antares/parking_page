<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Under Maintenance</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      .hero {
        min-height: 100vh;
        background-image: url("https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=1920&q=80");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
      }

      .card-maintenance {
        position: relative;
        z-index: 1;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="hero position-relative">
      <div class="overlay"></div>

      <div class="card-maintenance p-5 text-white text-center shadow-lg" style="max-width: 540px; width: 90%;">
        

        <h1 class="display-5 fw-bold mb-3">Site Under Maintenance</h1>
        <p class="lead mb-4">
          We're currently making improvements to serve you better.<br />
          Please check back soon.
        </p>
        <hr class="border-light opacity-50" />
        <p class="small text-white-50 mt-3 mb-0">
          We apologize for any inconvenience. Thank you for your patience.
        </p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
